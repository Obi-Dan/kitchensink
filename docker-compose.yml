version: '3.8'

services:
  mongodb:
    image: mongo:4.4 # Using version compatible with Dev Services for consistency
    container_name: kitchensink-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - kitchensink-network
    restart: unless-stopped

  kitchensink-quarkus:
    build:
      context: ./app-migrated # Path to the migrated app with its Dockerfile
      dockerfile: Dockerfile
    container_name: kitchensink-quarkus-app
    ports:
      - "${APP_HOST_PORT:-8080}:8080" # Host port configurable, container port fixed to 8080
    depends_on:
      - mongodb
    networks:
      - kitchensink-network
    environment:
      QUARKUS_MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/${APP_DB_NAME:-kitchensinkDB} # Use APP_DB_NAME
      QUARKUS_MONGODB_DATABASE: ${APP_DB_NAME:-kitchensinkDB} # Ensure consistency
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s # Quarkus apps start faster
    restart: unless-stopped

networks:
  kitchensink-network:
    driver: bridge
    # ipam configuration can often be omitted for simpler setups

volumes:
  mongo_data: # Persistent data for MongoDB 