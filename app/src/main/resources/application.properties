# Spring Boot Datasource Configuration for H2
spring.datasource.url=jdbc:h2:mem:kitchensink
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Spring Boot JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect # Usually auto-detected for H2

# H2 Console (optional, for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Set the application context path
server.servlet.context-path=/kitchensink
