<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register Member</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/screen.css}"/>
</head>
<body>
    <div id="container">
        <h1>Register New Member</h1>
        <div th:if="${errorMessage}" class="alert alert-danger">
            <p th:text="${errorMessage}">Error!</p>
        </div>
        <!-- Registration form processing to be handled by a POST mapping in MemberWebController -->
        <form action="#" th:action="@{/register}" th:object="${newMember}" method="post">
            <div>
                <label for="name">Name:</label>
                <input type="text" id="name" th:field="*{name}"/>
                <!-- Display validation errors for name if any -->
                <span class="invalid" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name Error</span>
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="text" id="email" th:field="*{email}"/>
                <span class="invalid" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">Email Error</span>
            </div>
            <div>
                <label for="phoneNumber">Phone #:</label>
                <input type="text" id="phoneNumber" th:field="*{phoneNumber}"/>
                <span class="invalid" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}">Phone Error</span>
            </div>
            <div>
                <input type="submit" value="Register" class="register"/>
            </div>
        </form>
        <p><a th:href="@{/members}">View All Members</a></p>
    </div>
</body>
</html>
